<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intellekt</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Intellekt</h1>
    <p>Customize your experience</p>

    <div class="possible-items">
        <div class="item-row">
            <span class="item-name">Cell phone</span>
            <button type="button" onclick="addMessage('message1')">Customize Message</button>
            <span id="message1" class="message-output"></span>
        </div>

        <div class="item-row">
            <span class="item-name">Food</span>
            <button type="button" onclick="addMessage('message2')">Customize Message</button>
            <span id="message2" class="message-output"></span>
        </div>

        <div class="item-row">
            <span class="item-name">Person</span>
            <button type="button" onclick="addMessage('message3')">Customize Message</button>
            <span id="message3" class="message-output"></span>
        </div>
    </div>

    <script>
        function addMessage(messageId) {
            let message = prompt("Write your message:");

            if (message !== null && message.trim() !== "") {
                document.getElementById(messageId).textContent = message;
            }
        }
    </script>
</body>
</html>
