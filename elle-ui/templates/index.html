<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intellekt</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 class="title">Intellekt</h1>
            <p class="subtitle">Customize your experience</p>

            <button class="btn btn-primary" type="button" onclick="addMessage()">
                Customize message
            </button>

            <p id="user-message" class="status-box"></p>
        </div>
    </div>

    <script>
        function addMessage() {
            alert("button clicked");   // test line

            let message = prompt("Enter your message:");

            if (message !== null && message.trim() !== "") {
                document.getElementById("user-message").textContent = message;
            }
        }
    </script>
</body>
</html>
