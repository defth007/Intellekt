<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intellekt</title>
    <link href="https://fonts.googleapis.com/css2?family=Fuzzy+Bubbles:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 class="title">Intellekt</h1>
            <p class="subtitle">My Distractions</p>

            <button class="btn btn-primary" type="button" onclick="addMessage('phone')">
                phone
            </button>

            <button class="btn btn-primary" type="button" onclick="addMessage('food')">
                food
            </button>

            <select id="distraction-select" class="btn btn-secondary" onchange="handleDropdown()">
                <option value="" disabled selected hidden>add distractions</option>
                <option value="bed">bed</option>
                <option value="wine glass">wine glass</option>
                <option value="tablewear">tablewear</option>
            </select>
        </div>
    </div>

    <script>
        function addMessage(itemName) {
            let message = prompt("Enter your message for " + itemName + ":");

            if (message !== null && message.trim() !== "") {
                document.getElementById("user-message").textContent =
                    itemName + ": " + message;
            }
        }

        function handleDropdown() {
            const select = document.getElementById("distraction-select");
            const itemName = select.value;

            if (itemName) {
                addMessage(itemName);
            }

            select.selectedIndex = 0;
        }
    </script>
</body>
</html>
