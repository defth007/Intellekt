<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intellekt</title>
    <link href="https://fonts.googleapis.com/css2?family=Fuzzy+Bubbles:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 class="title">Intellekt</h1>
            <p class="subtitle">My Distractions</p>

            <div id="button-list">
                <button class="btn btn-primary" type="button" onclick="showMessagePopup('phone')">
                    phone
                </button>

                <button class="btn btn-primary" type="button" onclick="showMessagePopup('food')">
                    food
                </button>
            </div>

            <select id="distraction-select" class="btn btn-secondary" onchange="handleDropdown()">
                <option value="" disabled selected hidden>add distractions</option>
                <option value="bed">bed</option>
                <option value="wine glass">wine glass</option>
                <option value="tablewear">tablewear</option>
            </select>
        </div>
    </div>

    <script>
        const customMessages = {
            phone: "Put your phone away and focus.",
            food: "Finish your task before eating.",
            bed: "Stay awake and keep working.",
            "wine glass": "Save it for later.",
            tablewear: "Put the tablewear aside for now."
        };

        function showMessagePopup(itemName) {
            const currentMessage = customMessages[itemName] || "Default message for " + itemName;
            const wantsToChange = confirm(
                itemName + ":\n\n" +
                currentMessage + "\n\n" +
                "Press OK to change message.\n" +
                "Press Cancel to keep it."
            );

            if (wantsToChange) {
                const newMessage = prompt("Change message for " + itemName + ":", currentMessage);

                if (newMessage !== null && newMessage.trim() !== "") {
                    customMessages[itemName] = newMessage;
                    alert("New message saved for " + itemName + ":\n\n" + newMessage);
                }
            }
        }

        function handleDropdown() {
            const select = document.getElementById("distraction-select");
            const itemName = select.value;

            if (!itemName) {
                return;
            }

            const buttonList = document.getElementById("button-list");
            const existingButtons = buttonList.getElementsByTagName("button");

            for (let i = 0; i < existingButtons.length; i++) {
                if (existingButtons[i].textContent.trim() === itemName) {
                    select.selectedIndex = 0;
                    return;
                }
            }

            const newButton = document.createElement("button");
            newButton.className = "btn btn-primary";
            newButton.type = "button";
            newButton.textContent = itemName;
            newButton.onclick = function () {
                showMessagePopup(itemName);
            };

            buttonList.appendChild(newButton);
            select.selectedIndex = 0;
        }
    </script>
</body>
</html>
